
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Study</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="study-body">
<div class="top-nav">
    <a href="/" class="nav-btn">← 홈으로</a>
    <a href="javascript:history.back()" class="nav-btn">뒤로가기</a>
</div>

<div class="study-container">
<div class="study-sidebar">
<h1>2학기 1차 Python Study</h1>
<div class="problem-list">
{% for i in range(1, 11) %}
<div class="problem-item" onclick="openProblem({{i}})">
<div>
<h3>{{i}}번 문제</h3>
<p>Python 알고리즘</p>
</div>
{% if i in solved %}
<span class="success-badge" id="badge-{{i}}">성공!</span>
{% else %}
<span class="pending-badge" id="badge-{{i}}">미해결</span>
{% endif %}
</div>
{% endfor %}
</div>
</div>

<div class="study-main">
<div class="card">
<h2 id="title">문제를 선택해주세요</h2>
<p id="desc">왼쪽 문제를 선택하세요.</p>
</div>

<div class="card">
<textarea id="code-input" placeholder="Python 코드를 작성하세요"></textarea>
<div class="bottom-row">
<button onclick="submitCode()" class="submit-btn">제출하기</button>
<div id="result"></div>
</div>
</div>
</div>
</div>

<script>
let currentProblem = null;

function openProblem(num){
 currentProblem = num;
 document.getElementById('title').innerText = `${num}번 문제`;
 if(num === 1){
   document.getElementById('desc').innerText = 'Hello World를 출력하시오';
 } else if(num === 2){
   document.getElementById('desc').innerText = '두 수를 곱하시오';
 } else if(num === 3){
   document.getElementById('desc').innerText = '두 수를 곱하시오';
 }else {
   document.getElementById('desc').innerText = '문제 설명을 추가하세요';
 }
}

async function submitCode(){
 if(!currentProblem){ alert('문제를 선택하세요'); return; }

 const response = await fetch('/submit_code',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   problem_number: currentProblem,
   code: document.getElementById('code-input').value
  })
 });

 const data = await response.json();

 if(data.success){
   document.getElementById('result').innerHTML = '✅ 성공!';
   const badge = document.getElementById(`badge-${currentProblem}`);
   badge.innerText='성공!';
   badge.className='success-badge';
 } else {
   document.getElementById('result').innerHTML = '❌ 실패!';
 }
}
</script>
</body>
</html>
